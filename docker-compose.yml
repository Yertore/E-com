version: "3.9"

services:
  # ─── POSTGRES ────────────────────────────────────────────────
  postgres-catalog:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: catalog
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
    ports:
      - "6433:5432"
    volumes:
      - pg_catalog_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog -d catalog"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-order:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: orders
      POSTGRES_PASSWORD: orders
    ports:
      - "6434:5432"
    volumes:
      - pg_order_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orders -d orders"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-payment:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payment
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: payment
    ports:
      - "6435:5432"
    volumes:
      - pg_payment_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment -d payment"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── MIGRATIONS ──────────────────────────────────────────────
  migrate-catalog:
    image: migrate/migrate:v4.17.0
    volumes:
      - ./catalog-service/migrations:/migrations
    command: >
      -path=/migrations
      -database "postgres://catalog:catalog@postgres-catalog:5432/catalog?sslmode=disable"
      up
    depends_on:
      postgres-catalog:
        condition: service_healthy

  migrate-order:
    image: migrate/migrate:v4.17.0
    volumes:
      - ./order-service/migrations:/migrations
    command: >
      -path=/migrations
      -database "postgres://orders:orders@postgres-order:5432/orders?sslmode=disable"
      up
    depends_on:
      postgres-order:
        condition: service_healthy

  migrate-payment:
    image: migrate/migrate:v4.17.0
    volumes:
      - ./payment-service/migrations:/migrations
    command: >
      -path=/migrations
      -database "postgres://payment:payment@postgres-payment:5432/payment?sslmode=disable"
      up
    depends_on:
      postgres-payment:
        condition: service_healthy

  # ─── REDIS ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ─── KAFKA ───────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "29092:29092"

volumes:
  pg_catalog_data:
  pg_order_data:
  pg_payment_data: